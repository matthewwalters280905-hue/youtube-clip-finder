<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Clip Finder</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="search-panel" aria-labelledby="page-title">
        <p class="eyebrow">Clip radar</p>
        <h1 id="page-title">Find YouTube clips worth using</h1>

        <form id="search-form" class="search-form">
          <label>
            <span>Prompt</span>
            <textarea id="prompt" rows="4" placeholder="Example: short explainers about AI agents for beginners"></textarea>
          </label>

          <div class="controls">
            <label>
              <span>Video type</span>
              <select id="video-kind">
                <option value="both" selected>Shorts + videos</option>
                <option value="shorts">Shorts only</option>
                <option value="standard">Normal videos</option>
              </select>
            </label>
            <label>
              <span>Clip length</span>
              <select id="duration">
                <option value="short" selected>Under 4 minutes</option>
                <option value="medium">4 to 20 minutes</option>
                <option value="any">Any length</option>
              </select>
            </label>
            <label>
              <span>Sort by</span>
              <select id="order">
                <option value="relevance" selected>Relevance</option>
                <option value="viewCount">View count</option>
                <option value="date">Newest</option>
                <option value="rating">Rating</option>
              </select>
            </label>
            <label class="small-control">
              <span>Results</span>
              <input id="maxResults" type="number" min="1" max="25" value="12">
            </label>
          </div>

          <p class="fine-print">Rights flags are helpful guesses from public metadata, not legal advice or a guarantee.</p>

          <button class="primary-action" type="submit">
            <span class="search-icon" aria-hidden="true"></span>
            Gather clips
          </button>
        </form>
      </section>

      <section class="results-panel" aria-live="polite">
        <div class="results-header">
          <div>
            <p class="eyebrow">Results</p>
            <h2 id="result-title">Ready when you are</h2>
          </div>
          <button id="copy-list" class="secondary-action" type="button" disabled>Copy list</button>
        </div>

        <div id="message" class="message">Add a prompt and the app will collect embeddable videos, add duration and view data, estimate rights risk, then rank the clips for you.</div>
        <div id="results" class="results-grid"></div>
      </section>
    </main>

    <template id="result-card-template">
      <article class="clip-card">
        <a class="thumb-link" target="_blank" rel="noreferrer">
          <img alt="">
          <span class="duration"></span>
        </a>
        <div class="clip-content">
          <div class="clip-heading">
            <h3></h3>
            <span class="score"></span>
          </div>
          <div class="badges">
            <span class="type-badge"></span>
            <span class="risk-badge"></span>
          </div>
          <p class="meta"></p>
          <p class="description"></p>
          <div class="clip-actions">
            <a class="watch-link" target="_blank" rel="noreferrer">Open</a>
            <button class="copy-url" type="button">Copy URL</button>
            <button class="embed-toggle" type="button">Preview</button>
            <button class="moments-toggle" type="button">Find moments</button>
          </div>
          <div class="embed-wrap" hidden></div>
          <div class="moments-wrap" hidden></div>
        </div>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
